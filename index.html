<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球基金趋势追踪器</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0B0E14;
      --bg-secondary: #151921;
      --bg-tertiary: #1C2230;
      --bg-card: #1A1F2E;
      --text-primary: #F1F5F9;
      --text-secondary: #94A3B8;
      --text-muted: #64748B;
      --accent-green: #10B981;
      --accent-green-dim: rgba(16, 185, 129, 0.15);
      --accent-red: #EF4444;
      --accent-red-dim: rgba(239, 68, 68, 0.15);
      --accent-blue: #3B82F6;
      --accent-purple: #8B5CF6;
      --border-color: #2D3548;
      --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.4);
      --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.3);
      --shadow-sm: 0 2px 10px rgba(0, 0, 0, 0.2);
      --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --gradient-gold: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .app-container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 2rem;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logo {
      width: 48px;
      height: 48px;
      background: var(--gradient-primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: white;
      box-shadow: var(--shadow-md);
    }

    .header-text h1 {
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-text p {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .update-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }

    .update-info i {
      color: var(--accent-green);
    }

    .btn {
      padding: 0.625rem 1.25rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-refresh {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-refresh:hover {
      background: var(--bg-secondary);
      border-color: var(--accent-blue);
    }

    .btn-refresh.loading i {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .fund-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .fund-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid transparent;
      position: relative;
      overflow: hidden;
    }

    .fund-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--card-accent, var(--accent-blue));
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .fund-card:hover::before,
    .fund-card.active::before {
      opacity: 1;
    }

    .fund-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      border-color: var(--border-color);
    }

    .fund-card.active {
      border-color: var(--card-accent, var(--accent-blue));
      background: var(--bg-secondary);
    }

    .fund-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .fund-info {
      flex: 1;
    }

    .fund-name {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .fund-name-en {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .fund-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      background: var(--card-accent-dim, rgba(59, 130, 246, 0.15));
      color: var(--card-accent, var(--accent-blue));
    }

    .fund-price-section {
      margin-bottom: 1rem;
    }

    .fund-price {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .fund-change {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 0.75rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .fund-change.up {
      background: var(--accent-green-dim);
      color: var(--accent-green);
    }

    .fund-change.down {
      background: var(--accent-red-dim);
      color: var(--accent-red);
    }

    .fund-mini-chart {
      height: 50px;
      margin-top: 0.5rem;
      border-radius: 8px;
      overflow: hidden;
    }

    .trend-section {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 1.5rem;
      margin-top: 2rem;
      border: 1px solid var(--border-color);
    }

    .trend-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .trend-title {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .trend-title h2 {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .trend-symbol {
      background: var(--accent-blue);
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .time-range-selector {
      display: flex;
      gap: 0.5rem;
    }

    .time-btn {
      padding: 0.5rem 1rem;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .time-btn:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .time-btn.active {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
      color: white;
    }

    .chart-container {
      position: relative;
      height: 400px;
      margin-top: 1rem;
    }

    .chart-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 400px;
      color: var(--text-secondary);
    }

    .chart-placeholder i {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .chart-placeholder p {
      font-size: 1rem;
    }

    .market-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--bg-tertiary);
      border-radius: 8px;
      font-size: 0.875rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-green);
      animation: pulse 2s infinite;
    }

    .status-dot.closed {
      background: var(--text-muted);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .footer {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-color);
      text-align: center;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    @media (max-width: 768px) {
      .app-container {
        padding: 1rem;
      }

      .header {
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
      }

      .header-right {
        width: 100%;
        justify-content: space-between;
      }

      .fund-grid {
        grid-template-columns: 1fr;
      }

      .trend-header {
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
      }

      .time-range-selector {
        width: 100%;
        overflow-x: auto;
      }

      .chart-container {
        height: 300px;
      }
    }

    .fade-in {
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-appear {
      animation: cardAppear 0.4s ease forwards;
      opacity: 0;
    }

    @keyframes cardAppear {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <i class="fas fa-chart-line"></i>
        </div>
        <div class="header-text">
          <h1>全球基金趋势追踪器</h1>
          <p>实时监控国际市场动态</p>
        </div>
      </div>
      <div class="header-right">
        <div class="update-info">
          <i class="fas fa-circle"></i>
          <span id="lastUpdate">数据加载中...</span>
        </div>
        <div class="market-status">
          <span class="status-dot" id="statusDot"></span>
          <span id="marketStatus">市场交易中</span>
        </div>
        <button class="btn btn-refresh" onclick="refreshData()">
          <i class="fas fa-sync-alt"></i>
          刷新数据
        </button>
      </div>
    </header>

    <div class="fund-grid" id="fundGrid"></div>

    <section class="trend-section">
      <div class="trend-header">
        <div class="trend-title">
          <h2 id="selectedFundName">纳斯达克综合指数</h2>
          <span class="trend-symbol" id="selectedFundSymbol">NASDAQ</span>
        </div>
        <div class="time-range-selector">
          <button class="time-btn" data-range="1D" onclick="changeTimeRange('1D')">1天</button>
          <button class="time-btn active" data-range="1W" onclick="changeTimeRange('1W')">1周</button>
          <button class="time-btn" data-range="1M" onclick="changeTimeRange('1M')">1月</button>
          <button class="time-btn" data-range="3M" onclick="changeTimeRange('3M')">3月</button>
          <button class="time-btn" data-range="1Y" onclick="changeTimeRange('1Y')">1年</button>
        </div>
      </div>
      <div class="chart-container" id="chartContainer">
        <canvas id="trendChart"></canvas>
      </div>
    </section>

    <footer class="footer">
      <p>数据仅供参考，不构成投资建议 · 最后更新: <span id="footerUpdate"></span></p>
    </footer>
  </div>

  <script>
    const fundConfigs = [
      {
        symbol: 'NASDAQ',
        name: '纳斯达克综合指数',
        nameEn: 'NASDAQ Composite',
        basePrice: 15670.00,
        volatility: 0.015,
        icon: 'fa-brands fa-python',
        color: '#00D4FF',
        colorDim: 'rgba(0, 212, 255, 0.15)'
      },
      {
        symbol: 'HSTECH',
        name: '恒生科技指数',
        nameEn: 'Hang Seng TECH',
        basePrice: 3845.00,
        volatility: 0.02,
        icon: 'fa-solid fa-building-columns',
        color: '#FF6B6B',
        colorDim: 'rgba(255, 107, 107, 0.15)'
      },
      {
        symbol: 'SP500',
        name: '标普500指数',
        nameEn: 'S&P 500',
        basePrice: 4950.00,
        volatility: 0.012,
        icon: 'fa-solid fa-chart-simple',
        color: '#10B981',
        colorDim: 'rgba(16, 185, 129, 0.15)'
      },
      {
        symbol: 'NONFERROUS',
        name: '有色金属',
        nameEn: 'Non-Ferrous Metals',
        basePrice: 6280.00,
        volatility: 0.018,
        icon: 'fa-solid fa-gears',
        color: '#F59E0B',
        colorDim: 'rgba(245, 158, 11, 0.15)'
      },
      {
        symbol: 'GOLD',
        name: '黄金',
        nameEn: 'Gold',
        basePrice: 2035.00,
        volatility: 0.008,
        icon: 'fa-solid fa-coins',
        color: '#EAB308',
        colorDim: 'rgba(234, 179, 8, 0.15)'
      },
      {
        symbol: 'SILVER',
        name: '白银',
        nameEn: 'Silver',
        basePrice: 23.25,
        volatility: 0.025,
        icon: 'fa-solid fa-ring',
        color: '#9CA3AF',
        colorDim: 'rgba(156, 163, 175, 0.15)'
      },
      {
        symbol: 'OIL',
        name: '原油',
        nameEn: 'Crude Oil',
        basePrice: 75.50,
        volatility: 0.022,
        icon: 'fa-solid fa-droplet',
        color: '#64748B',
        colorDim: 'rgba(100, 116, 139, 0.15)'
      },
      {
        symbol: 'CSI300',
        name: '沪深300',
        nameEn: 'CSI 300',
        basePrice: 3420.00,
        volatility: 0.016,
        icon: 'fa-solid fa-yen-sign',
        color: '#DC2626',
        colorDim: 'rgba(220, 38, 38, 0.15)'
      }
    ];

    let fundData = {};
    let currentChart = null;
    let selectedFund = 'NASDAQ';
    let currentTimeRange = '1W';
    let autoRefreshInterval = null;

    function generateFundPrice(config, timestamp) {
      const baseTime = new Date('2024-01-01').getTime();
      const timeDiff = timestamp - baseTime;
      const randomWalk = Math.sin(timeDiff / 3600000) * config.basePrice * 0.05;
      const noise = (Math.random() - 0.5) * config.basePrice * config.volatility;
      const trend = (timestamp - Date.now()) / (365 * 24 * 60 * 60 * 1000) * config.basePrice * 0.1;
      return config.basePrice + randomWalk + noise + trend;
    }

    function generateHistoryData(config, range) {
      const now = Date.now();
      const points = [];
      const intervals = {
        '1D': 5 * 60 * 1000,
        '1W': 30 * 60 * 1000,
        '1M': 4 * 60 * 60 * 1000,
        '3M': 12 * 60 * 60 * 1000,
        '1Y': 2 * 24 * 60 * 60 * 1000
      };
      const durations = {
        '1D': 24 * 60 * 60 * 1000,
        '1W': 7 * 24 * 60 * 60 * 1000,
        '1M': 30 * 24 * 60 * 60 * 1000,
        '3M': 90 * 24 * 60 * 60 * 1000,
        '1Y': 365 * 24 * 60 * 60 * 1000
      };

      const count = Math.min(Math.floor(durations[range] / intervals[range]), 200);
      let price = config.basePrice * (0.85 + Math.random() * 0.1);

      for (let i = 0; i < count; i++) {
        const time = now - (count - i) * intervals[range];
        const change = (Math.random() - 0.48) * config.basePrice * config.volatility * 0.3;
        price = Math.max(config.basePrice * 0.6, Math.min(config.basePrice * 1.4, price + change));
        points.push({ time, price: parseFloat(price.toFixed(2)) });
      }

      return points;
    }

    function generateMiniChartData(config) {
      const points = [];
      let price = config.basePrice;
      for (let i = 0; i < 20; i++) {
        const change = (Math.random() - 0.5) * config.basePrice * config.volatility;
        price = Math.max(config.basePrice * 0.9, Math.min(config.basePrice * 1.1, price + change));
        points.push(parseFloat(price.toFixed(2)));
      }
      return points;
    }

    function initFundData() {
      fundConfigs.forEach(config => {
        const currentPrice = generateFundPrice(config, Date.now());
        const previousClose = generateFundPrice(config, Date.now() - 24 * 60 * 60 * 1000);
        const change = currentPrice - previousClose;
        const changePercent = (change / previousClose) * 100;

        fundData[config.symbol] = {
          ...config,
          price: parseFloat(currentPrice.toFixed(2)),
          previousClose: parseFloat(previousClose.toFixed(2)),
          change: parseFloat(change.toFixed(2)),
          changePercent: parseFloat(changePercent.toFixed(2)),
          trend: change >= 0 ? 'up' : 'down',
          miniChart: generateMiniChartData(config),
          history: generateHistoryData(config, currentTimeRange)
        };
      });
    }

    function formatPrice(price, symbol) {
      if (symbol === 'SILVER' || symbol === 'OIL') {
        return price.toFixed(2);
      }
      return price.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function formatChange(change) {
      const sign = change >= 0 ? '+' : '';
      return `${sign}${change.toFixed(2)}`;
    }

    function formatPercent(percent) {
      const sign = percent >= 0 ? '+' : '';
      return `${sign}${percent.toFixed(2)}%`;
    }

    function renderMiniChart(canvasId, data, trend) {
      const ctx = document.getElementById(canvasId).getContext('2d');
      const color = trend === 'up' ? '#10B981' : '#EF4444';
      
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: data.map((_, i) => i),
          datasets: [{
            data: data,
            borderColor: color,
            borderWidth: 2,
            fill: true,
            backgroundColor: color + '20',
            tension: 0.4,
            pointRadius: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { enabled: false }
          },
          scales: {
            x: { display: false },
            y: { display: false }
          },
          elements: {
            line: {
              borderCapStyle: 'round',
              borderJoinStyle: 'round'
            }
          }
        }
      });
    }

    function renderFundCards() {
      const grid = document.getElementById('fundGrid');
      grid.innerHTML = '';

      fundConfigs.forEach((config, index) => {
        const data = fundData[config.symbol];
        const card = document.createElement('div');
        card.className = `fund-card card-appear ${selectedFund === config.symbol ? 'active' : ''}`;
        card.dataset.symbol = config.symbol;
        card.style.setProperty('--card-accent', config.color);
        card.style.setProperty('--card-accent-dim', config.colorDim);
        card.style.animationDelay = `${index * 0.05}s`;
        card.onclick = () => selectFund(config.symbol);

        card.innerHTML = `
          <div class="fund-card-header">
            <div class="fund-info">
              <div class="fund-name">${config.name}</div>
              <div class="fund-name-en">${config.nameEn}</div>
            </div>
            <div class="fund-icon" style="background: ${config.colorDim}; color: ${config.color};">
              <i class="${config.icon}"></i>
            </div>
          </div>
          <div class="fund-price-section">
            <div class="fund-price">${formatPrice(data.price, config.symbol)}</div>
            <span class="fund-change ${data.trend}">
              <i class="fas fa-caret-${data.trend === 'up' ? 'up' : 'down'}"></i>
              ${formatChange(data.change)} (${formatPercent(data.changePercent)})
            </span>
          </div>
          <div class="fund-mini-chart">
            <canvas id="miniChart_${config.symbol}"></canvas>
          </div>
        `;

        grid.appendChild(card);
      });

      setTimeout(() => {
        fundConfigs.forEach(config => {
          const data = fundData[config.symbol];
          renderMiniChart(`miniChart_${config.symbol}`, data.miniChart, data.trend);
        });
      }, 100);
    }

    function selectFund(symbol) {
      selectedFund = symbol;
      const cards = document.querySelectorAll('.fund-card');
      cards.forEach(card => {
        card.classList.toggle('active', card.dataset.symbol === symbol);
      });

      const config = fundConfigs.find(c => c.symbol === symbol);
      document.getElementById('selectedFundName').textContent = config.name;
      document.getElementById('selectedFundSymbol').textContent = config.symbol;
      
      updateTrendChart();
    }

    function updateTrendChart() {
      const data = fundData[selectedFund];
      const history = generateHistoryData(data, currentTimeRange);
      
      if (currentChart) {
        currentChart.destroy();
      }

      const ctx = document.getElementById('trendChart').getContext('2d');
      const trend = history[history.length - 1].price >= history[0].price;
      const color = trend ? '#10B981' : '#EF4444';

      const gradient = ctx.createLinearGradient(0, 0, 0, 400);
      gradient.addColorStop(0, color + '40');
      gradient.addColorStop(1, color + '00');

      currentChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: history.map(p => {
            const date = new Date(p.time);
            if (currentTimeRange === '1D') {
              return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            } else if (currentTimeRange === '1W' || currentTimeRange === '1M') {
              return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
            } else {
              return date.toLocaleDateString('zh-CN', { year: '2-digit', month: 'short' });
            }
          }),
          datasets: [{
            label: data.name,
            data: history.map(p => p.price),
            borderColor: color,
            backgroundColor: gradient,
            borderWidth: 3,
            fill: true,
            tension: 0.4,
            pointRadius: 0,
            pointHoverRadius: 6,
            pointHoverBackgroundColor: color,
            pointHoverBorderColor: '#fff',
            pointHoverBorderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            intersect: false,
            mode: 'index'
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(15, 23, 42, 0.95)',
              titleColor: '#F1F5F9',
              bodyColor: '#F1F5F9',
              borderColor: color,
              borderWidth: 1,
              padding: 12,
              displayColors: false,
              titleFont: { size: 14, weight: '600' },
              bodyFont: { size: 13 },
              callbacks: {
                label: function(context) {
                  return `${data.name}: ${formatPrice(context.parsed.y, selectedFund)}`;
                }
              }
            }
          },
          scales: {
            x: {
              grid: {
                color: 'rgba(148, 163, 184, 0.1)',
                drawBorder: false
              },
              ticks: {
                color: '#64748B',
                font: { size: 11 },
                maxTicksLimit: 8
              }
            },
            y: {
              grid: {
                color: 'rgba(148, 163, 184, 0.1)',
                drawBorder: false
              },
              ticks: {
                color: '#64748B',
                font: { size: 11 },
                callback: function(value) {
                  return formatPrice(value, selectedFund);
                }
              }
            }
          },
          animation: {
            duration: 800,
            easing: 'easeOutQuart'
          }
        }
      });
    }

    function changeTimeRange(range) {
      currentTimeRange = range;
      localStorage.setItem('selectedTimeRange', range);
      
      document.querySelectorAll('.time-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.range === range);
      });

      updateTrendChart();
    }

    function updatePrices() {
      fundConfigs.forEach(config => {
        const currentPrice = generateFundPrice(config, Date.now());
        const previousClose = fundData[config.symbol].previousClose;
        const change = currentPrice - previousClose;
        const changePercent = (change / previousClose) * 100;

        fundData[config.symbol].price = parseFloat(currentPrice.toFixed(2));
        fundData[config.symbol].change = parseFloat(change.toFixed(2));
        fundData[config.symbol].changePercent = parseFloat(changePercent.toFixed(2));
        fundData[config.symbol].trend = change >= 0 ? 'up' : 'down';

        const miniData = generateMiniChartData(config);
        fundData[config.symbol].miniChart = miniData;
      });

      renderFundCards();
      updateLastUpdateTime();
    }

    function refreshData() {
      const btn = document.querySelector('.btn-refresh');
      btn.classList.add('loading');
      
      setTimeout(() => {
        updatePrices();
        btn.classList.remove('loading');
      }, 1000);
    }

    function updateLastUpdateTime() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('lastUpdate').textContent = `最后更新: ${timeStr}`;
      document.getElementById('footerUpdate').textContent = timeStr;
    }

    function checkMarketStatus() {
      const now = new Date();
      const hour = now.getUTCHours();
      const day = now.getUTCDay();
      
      const isWeekend = day === 0 || day === 6;
      const isMarketHours = hour >= 13 && hour < 20;
      
      const statusDot = document.getElementById('statusDot');
      const marketStatus = document.getElementById('marketStatus');
      
      if (isWeekend) {
        statusDot.classList.add('closed');
        marketStatus.textContent = '周末休市';
      } else if (isMarketHours) {
        statusDot.classList.remove('closed');
        marketStatus.textContent = '市场交易中';
      } else {
        statusDot.classList.add('closed');
        marketStatus.textContent = '盘后交易';
      }
    }

    function init() {
      const savedRange = localStorage.getItem('selectedTimeRange');
      if (savedRange) {
        currentTimeRange = savedRange;
        document.querySelectorAll('.time-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.range === savedRange);
        });
      }

      initFundData();
      renderFundCards();
      selectFund('NASDAQ');
      updateLastUpdateTime();
      checkMarketStatus();

      autoRefreshInterval = setInterval(() => {
        updatePrices();
      }, 30000);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
